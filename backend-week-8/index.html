<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .btn-subtract {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .btn-multiply {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .btn-divide {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
        }

        .result-container {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            min-height: 80px;
        }

        .result-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .error {
            color: #f5576c;
        }

        .loading {
            color: #667eea;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <h1>🧮 Calculator</h1>
        
        <div class="input-group">
            <label for="num1">First Number</label>
            <input type="number" id="num1" placeholder="Enter first number" value="10">
        </div>

        <div class="input-group">
            <label for="num2">Second Number</label>
            <input type="number" id="num2" placeholder="Enter second number" value="5">
        </div>

        <div class="button-grid">
            <button class="btn-add" onclick="calculate('sum')">➕ Add</button>
            <button class="btn-subtract" onclick="calculate('sub')">➖ Subtract</button>
            <button class="btn-multiply" onclick="calculate('mul')">✖️ Multiply</button>
            <button class="btn-divide" onclick="calculate('div')">➗ Divide</button>
        </div>

        <div class="result-container">
            <div class="result-label">Result:</div>
            <div id="result" class="result-value">-</div>
        </div>
    </div>

    <script>
        async function calculate(operation) {
            const num1 = document.getElementById('num1').value;
            const num2 = document.getElementById('num2').value;
            const resultDiv = document.getElementById('result');

            if (num1 === '' || num2 === '') {
                resultDiv.textContent = 'Please enter both numbers';
                resultDiv.className = 'result-value error';
                return;
            }

            resultDiv.textContent = 'Calculating...';
            resultDiv.className = 'result-value loading';

            try {
                let url;
                
                if (operation === 'mul') {
                    url = `http://localhost:3000/${operation}/${num1}/${num2}`;
                } else {
                    url = `http://localhost:3000/${operation}?a=${num1}&b=${num2}`;
                }

                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const data = await response.json();
                
                resultDiv.textContent = data.ans;
                resultDiv.className = 'result-value';
                
            } catch (error) {
                console.error('Error:', error);
                resultDiv.textContent = 'Error calculating result';
                resultDiv.className = 'result-value error';
            }
        }

        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                calculate('sum');
            }
        });
    </script>
</body>
</html>
