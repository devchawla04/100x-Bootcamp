<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="index.js"></script>
    <title>Todo App</title>
</head>
<body>
    <div class="container">
        <h1>My Todo List</h1>
        
        <div class="input-section">
            <input type="text" id="todo-input" placeholder="Add a new task..." onkeypress="if(event.key === 'Enter') addTodo()">
            <button id="add-btn" onclick="addTodo()">
                <span>Add</span>
            </button>
        </div>

        <ul id="todo-list"></ul>
    </div>
</body>
</html>
